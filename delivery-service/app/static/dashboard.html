<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseKitchen Delivery Dashboard</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        --bg: #f6f7f8;
        --panel: #ffffff;
        --ink: #1f2933;
        --muted: #66788a;
        --accent: #111111;
        --accent-dark: #2f2f2f;
        --border: #d8d8d8;
        --ok: #2f855a;
        --warn: #b7791f;
        --danger: #c53030;
        --route: #2563eb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      .shell {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px;
      }
      .grid {
        display: grid;
        gap: 18px;
      }
      .hero {
        grid-template-columns: 1.15fr 0.85fr;
      }
      .main {
        grid-template-columns: 1.05fr 0.95fr;
        margin-top: 18px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 22px;
      }
      h1, h2, h3, p { margin: 0; }
      h1 { font-size: 1.7rem; }
      .muted { color: var(--muted); }
      .eyebrow {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
      }
      .auth-row, .location-grid, .stats-grid {
        display: grid;
        gap: 12px;
      }
      .auth-row {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-top: 18px;
      }
      .location-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 14px;
      }
      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        margin-top: 16px;
      }
      .register-grid {
        display: grid;
        gap: 12px;
        margin-top: 18px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      input, select, button {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 12px 14px;
        font: inherit;
      }
      button {
        border: none;
        background: var(--accent);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover { background: var(--accent-dark); }
      button.secondary {
        background: #ececec;
        color: var(--ink);
      }
      button.success { background: var(--ok); }
      button.warning { background: var(--warn); }
      .toolbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }
      .toolbar button {
        width: auto;
        min-width: 150px;
      }
      .status {
        min-height: 22px;
        margin-top: 12px;
        color: var(--muted);
      }
      .stat {
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #f8fafc;
      }
      .stat .value {
        margin-top: 6px;
        font-size: 1.55rem;
        font-weight: 800;
      }
      .map-shell {
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        background: #eef4f8;
      }
      .map {
        min-height: 320px;
      }
      .map-meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        padding: 12px 14px;
        border-top: 1px solid var(--border);
        background: #fff;
        font-size: 0.82rem;
        color: var(--muted);
      }
      .map-meta span {
        background: #f8fafc;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 5px 10px;
      }
      .table-wrap {
        overflow: auto;
        margin-top: 16px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        font-size: 0.95rem;
      }
      th {
        color: var(--muted);
        font-weight: 700;
      }
      .tag {
        display: inline-block;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.8rem;
        font-weight: 700;
      }
      .critical { background: #fde2e2; color: var(--danger); }
      .high { background: #fdebd3; color: var(--warn); }
      .normal { background: #e4f3e8; color: var(--ok); }
      .low { background: #edf2f7; color: var(--muted); }
      .empty {
        color: var(--muted);
        padding: 18px 0;
      }
      .workflow {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }
      .workflow-step {
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        background: #f8fafc;
      }
      .workflow-step.active {
        border-color: var(--route);
        background: #eff6ff;
      }
      .workflow-index {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: #e5e7eb;
        color: var(--ink);
        font-size: 0.8rem;
        font-weight: 700;
      }
      .workflow-step.active .workflow-index {
        background: var(--route);
        color: #fff;
      }
      .queue-meta {
        display: grid;
        gap: 4px;
      }
      .inline-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .inline-actions button {
        width: auto;
        padding: 8px 10px;
      }
      .location-note {
        margin-top: 10px;
        font-size: 0.9rem;
      }
      .leaflet-container {
        font: inherit;
      }
      .map-popup {
        font-size: 0.92rem;
      }
      button[disabled] {
        cursor: not-allowed;
        opacity: 0.55;
      }
      /* Warm minimal dashboard skin inspired by the provided reference. */
      :root {
        --bg: #efe6d4;
        --panel: #dfd0b1;
        --panel-soft: #eadfc9;
        --panel-softer: #f5eddf;
        --ink: #080808;
        --muted: #746b5f;
        --accent: #050505;
        --accent-dark: #1f1a13;
        --border: rgba(56, 45, 27, 0.08);
        --ok: #2e9f6f;
        --warn: #c8872d;
        --danger: #c75664;
        --route: #4da6b8;
        --lilac: #b886d9;
      }
      body {
        background:
          radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 34%),
          radial-gradient(circle at 82% 18%, rgba(85,166,184,0.12), transparent 26%),
          var(--bg);
        color: var(--ink);
      }
      .shell {
        max-width: 1500px;
        padding: 28px;
      }
      h1 { font-size: clamp(2rem, 3vw, 3.4rem); letter-spacing: -0.06em; }
      h2 { letter-spacing: -0.035em; }
      .eyebrow {
        color: #0a0a0a;
        letter-spacing: 0.05em;
      }
      .panel {
        background: linear-gradient(145deg, var(--panel-soft), var(--panel));
        border: 1px solid rgba(255,255,255,0.34);
        border-radius: 30px;
        padding: 24px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 24px 70px rgba(89, 68, 32, 0.09);
      }
      input,
      select {
        background: rgba(245, 237, 223, 0.7);
        border-color: rgba(22, 18, 12, 0.08);
        border-radius: 999px;
        outline: none;
      }
      input:focus,
      select:focus {
        border-color: rgba(0,0,0,0.28);
        box-shadow: 0 0 0 4px rgba(0,0,0,0.05);
      }
      button {
        border-radius: 999px;
        box-shadow: 0 12px 26px rgba(0,0,0,0.12);
      }
      button.secondary {
        background: rgba(245, 237, 223, 0.72);
        color: var(--ink);
        box-shadow: none;
      }
      button.success { background: var(--ok); }
      button.warning { background: var(--warn); }
      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .stat {
        position: relative;
        min-height: 142px;
        border: 1px solid rgba(255,255,255,0.32);
        border-radius: 28px;
        background: rgba(245, 237, 223, 0.44);
        overflow: hidden;
      }
      .stat::before {
        content: "";
        position: absolute;
        width: 46px;
        height: 46px;
        top: 14px;
        right: 14px;
        border-radius: 999px;
        background: #050505;
        box-shadow: 0 0 0 10px rgba(255,255,255,0.14);
      }
      .stat:nth-child(1)::before { background: var(--ok); }
      .stat:nth-child(2)::before { background: var(--route); }
      .stat:nth-child(3)::before { background: var(--lilac); }
      .stat .value {
        font-size: clamp(2rem, 4vw, 4.5rem);
        letter-spacing: -0.08em;
      }
      table {
        border-collapse: separate;
        border-spacing: 0 10px;
      }
      th {
        border: 0;
        padding: 8px 14px;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      td {
        border: 0;
        background: rgba(245, 237, 223, 0.46);
        padding: 14px;
      }
      tr td:first-child { border-radius: 18px 0 0 18px; }
      tr td:last-child { border-radius: 0 18px 18px 0; }
      .tag {
        border-radius: 999px;
      }
      .critical { background: #ffd5d9; color: #8a1f2e; }
      .high { background: #f7d58a; color: #5d3900; }
      .normal { background: #9bd8ae; color: #063f23; }
      .low { background: #d8cee9; color: #4d3270; }
      .map-shell,
      .workflow-step {
        border-color: rgba(255,255,255,0.34);
        border-radius: 28px;
        background: rgba(245, 237, 223, 0.45);
      }
      .map {
        border-radius: 28px 28px 0 0;
      }
      .map-meta {
        background: rgba(245, 237, 223, 0.72);
        border-top-color: rgba(255,255,255,0.34);
      }
      .map-meta span,
      .workflow-index {
        background: rgba(255,255,255,0.38);
        border: 1px solid rgba(255,255,255,0.35);
      }
      .workflow-step.active {
        background: rgba(77, 166, 184, 0.14);
        border-color: rgba(77, 166, 184, 0.42);
      }
      /* Final dashboard organization pass: cleaner structure, calmer color, less bulk. */
      :root {
        --bg: #f6f3ec;
        --panel: #ffffff;
        --panel-soft: #f3f7f2;
        --panel-softer: #eef4f8;
        --ink: #17201b;
        --muted: #6f7a72;
        --accent: #17201b;
        --accent-dark: #0b100d;
        --border: #e4ded2;
        --ok: #3f9d73;
        --warn: #d49a3a;
        --danger: #d76573;
        --route: #5d9fc4;
        --lilac: #a988d6;
      }
      body {
        background:
          linear-gradient(135deg, rgba(93,159,196,0.12), transparent 36%),
          linear-gradient(315deg, rgba(63,157,115,0.12), transparent 32%),
          var(--bg);
      }
      .shell {
        max-width: 1360px;
        padding: 24px;
      }
      .panel {
        border-radius: 24px;
        border: 1px solid rgba(23,32,27,0.08);
        background: rgba(255,255,255,0.82);
        box-shadow: 0 18px 45px rgba(33, 37, 31, 0.07);
      }
      h1 {
        font-size: clamp(2rem, 2.5vw, 2.8rem);
        letter-spacing: -0.045em;
      }
      h2 {
        font-size: 1.08rem;
        letter-spacing: -0.02em;
      }
      .grid {
        gap: 16px;
      }
      input,
      select {
        background: #f7f5ef;
        border: 1px solid var(--border);
      }
      button {
        box-shadow: none;
        transition: transform 160ms ease, background 160ms ease, opacity 160ms ease;
      }
      button:hover {
        transform: translateY(-1px);
      }
      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }
      .stat {
        min-height: 112px;
        padding: 16px;
        border-radius: 22px;
        background: linear-gradient(145deg, #ffffff, var(--panel-soft));
        border: 1px solid rgba(23,32,27,0.07);
      }
      .stat::before {
        width: 12px;
        height: 44px;
        top: 18px;
        right: 16px;
        border-radius: 999px;
        box-shadow: none;
        opacity: 0.9;
      }
      .stat .value {
        margin-top: 16px;
        font-size: clamp(1.7rem, 2.8vw, 3rem);
        letter-spacing: -0.055em;
      }
      .table-wrap {
        margin-top: 12px;
      }
      table {
        border-spacing: 0 8px;
      }
      td {
        background: #ffffff;
        border-top: 1px solid rgba(23,32,27,0.06);
        border-bottom: 1px solid rgba(23,32,27,0.06);
      }
      tr td:first-child {
        border-left: 1px solid rgba(23,32,27,0.06);
      }
      tr td:last-child {
        border-right: 1px solid rgba(23,32,27,0.06);
      }
      .map-shell,
      .workflow-step {
        border-radius: 22px;
        background: #ffffff;
        border-color: rgba(23,32,27,0.07);
      }
      .map {
        border-radius: 22px 22px 0 0;
      }
      .map-meta {
        background: #f7f5ef;
      }
      .workflow-step.active {
        background: #edf6f8;
        border-color: rgba(93,159,196,0.28);
      }
      .critical { background: #ffe3e7; color: #9b2536; }
      .high { background: #fff0c7; color: #7a4a00; }
      .normal { background: #dff4e8; color: #1f6b48; }
      .low { background: #ebe4f7; color: #634096; }
      .recommended-row td {
        background: #f6fff4;
        border-color: rgba(63,157,115,0.24);
      }
      .recommend-tag {
        display: inline-block;
        width: fit-content;
        margin-top: 6px;
        border-radius: 999px;
        padding: 3px 8px;
        background: #dff4e8;
        color: #1f6b48;
        font-size: 0.72rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .eta-meta {
        display: grid;
        gap: 3px;
        min-width: 96px;
      }
      .eta-meta strong {
        font-size: 1rem;
      }
      .eta-savings {
        color: var(--ok);
        font-size: 0.78rem;
        font-weight: 700;
      }
      @media (max-width: 960px) {
        .hero, .main, .location-grid, .register-grid {
          grid-template-columns: 1fr;
        }
        .toolbar button {
          width: 100%;
        }
        .shell { padding: 16px; }
        .panel { border-radius: 24px; }
        tr td:first-child,
        tr td:last-child { border-radius: 18px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="grid hero">
        <section class="panel">
          <div class="eyebrow">Delivery Operations</div>
          <h1>Delivery Console</h1>
          <p class="muted" style="margin-top: 8px;">Claim the next order, keep location fresh, and move the delivery through the right stage.</p>
          <div class="auth-row">
            <input id="email" placeholder="Delivery email" />
            <input id="password" type="password" placeholder="Password" />
            <button id="loginBtn">Sign In</button>
          </div>
          <div class="toolbar">
            <button class="secondary" id="refreshBtn">Refresh</button>
            <button class="secondary" id="useBrowserLocationBtn">Use Browser Location</button>
          </div>
          <div class="status" id="statusText">Sign in to load the driver workspace.</div>
          <div class="register-grid">
            <input id="registerFullName" placeholder="Driver full name" />
            <input id="registerPhone" placeholder="Phone number" />
            <input id="registerEmail" placeholder="Driver email" />
            <input id="registerPassword" type="password" placeholder="Create password" />
            <input id="registerLatitude" placeholder="Latitude (optional)" />
            <input id="registerLongitude" placeholder="Longitude (optional)" />
          </div>
          <div class="toolbar">
            <button id="registerBtn">Apply as Delivery Agent</button>
          </div>
        </section>

        <section class="panel">
          <h2>Driver Snapshot</h2>
          <div class="stats-grid" id="statsGrid"></div>
        </section>
      </div>

      <div class="grid main">
        <section class="panel">
          <h2>Priority Queue</h2>
          <div class="muted" id="queueSummary"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Order</th>
                  <th>Priority</th>
                  <th>ETA</th>
                  <th>Status</th>
                  <th>Score</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="queueTable"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <h2>Current Delivery</h2>
          <div id="currentDelivery"></div>
          <div class="workflow" id="workflow"></div>
          <div class="toolbar">
            <button id="locationBtn">Update Location</button>
            <button class="warning" id="pickedUpBtn">Mark Picked Up</button>
            <button class="success" id="deliveredBtn">Mark Delivered</button>
          </div>
          <div class="muted location-note" id="locationHint"></div>
        </section>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      let authToken = "";
      let currentUser = null;
      let partner = null;
      let currentAssignment = null;
      let selectedDriverPoint = null;
      let deliveryMap = null;
      let deliveryLayers = null;

      const defaultGatewayUrl =
        window.PULSEKITCHEN_API_BASE_URL ||
        (window.location.port === "8000"
          ? `${window.location.origin}/api/v1`
          : `${window.location.protocol}//${window.location.hostname}:8000/api/v1`);

      const refs = {
        email: document.getElementById("email"),
        password: document.getElementById("password"),
        loginBtn: document.getElementById("loginBtn"),
        registerBtn: document.getElementById("registerBtn"),
        refreshBtn: document.getElementById("refreshBtn"),
        useBrowserLocationBtn: document.getElementById("useBrowserLocationBtn"),
        statusText: document.getElementById("statusText"),
        registerFullName: document.getElementById("registerFullName"),
        registerPhone: document.getElementById("registerPhone"),
        registerEmail: document.getElementById("registerEmail"),
        registerPassword: document.getElementById("registerPassword"),
        registerLatitude: document.getElementById("registerLatitude"),
        registerLongitude: document.getElementById("registerLongitude"),
        statsGrid: document.getElementById("statsGrid"),
        queueTable: document.getElementById("queueTable"),
        queueSummary: document.getElementById("queueSummary"),
        currentDelivery: document.getElementById("currentDelivery"),
        workflow: document.getElementById("workflow"),
        locationBtn: document.getElementById("locationBtn"),
        pickedUpBtn: document.getElementById("pickedUpBtn"),
        deliveredBtn: document.getElementById("deliveredBtn"),
        locationHint: document.getElementById("locationHint"),
      };

      function setStatus(message) {
        refs.statusText.textContent = message;
      }

      async function api(path, options = {}) {
        const response = await fetch(`${defaultGatewayUrl}${path}`, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...(authToken ? { Authorization: `Bearer ${authToken}` } : {}),
            ...(options.headers || {}),
          },
        });

        if (!response.ok) {
          const body = await response.text();
          throw new Error(body || `Request failed: ${response.status}`);
        }

        if (response.status === 204) {
          return null;
        }

        return response.json();
      }

      function statCard(label, value) {
        return `<div class="stat"><div class="muted">${label}</div><div class="value">${value}</div></div>`;
      }

      function formatAddress(rawAddress) {
        try {
          const address = typeof rawAddress === "string" ? JSON.parse(rawAddress) : rawAddress;
          return address.address || address.line1 || address.street_address_1 || rawAddress || "-";
        } catch (_error) {
          return rawAddress || "-";
        }
      }

      function formatQueueEta(order) {
        const payload = order.eta_payload || {};
        const etaMinutes = Number(payload.eta_minutes);
        if (!Number.isFinite(etaMinutes) || etaMinutes <= 0) {
          return `<span class="muted">ETA pending</span>`;
        }

        const standardEta = Number(payload.standard_eta_minutes);
        const savings = Number(payload.eta_savings_minutes);
        const savingsText =
          Number.isFinite(standardEta) &&
          Number.isFinite(savings) &&
          standardEta > etaMinutes &&
          savings > 0
            ? `<span class="eta-savings">saved ${savings} min vs ${standardEta} min</span>`
            : `<span class="muted">${Number(payload.distance_km || 0).toFixed(1)} km route</span>`;

        return `
          <div class="eta-meta">
            <strong>${etaMinutes} min</strong>
            ${savingsText}
          </div>
        `;
      }

      function parseAddress(rawAddress) {
        try {
          return typeof rawAddress === "string" ? JSON.parse(rawAddress) : rawAddress || {};
        } catch (_error) {
          return {};
        }
      }

      function parseCoordinate(value) {
        if (value === null || value === undefined || value === "") {
          return null;
        }
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : null;
      }

      function pointFromValues(latitude, longitude) {
        const lat = parseCoordinate(latitude);
        const lng = parseCoordinate(longitude);
        if (lat === null || lng === null) {
          return null;
        }
        return { lat, lng };
      }

      function setSelectedDriverPoint(point) {
        if (!point) {
          selectedDriverPoint = null;
          return;
        }
        selectedDriverPoint = {
          lat: Number(point.lat),
          lng: Number(point.lng),
        };
      }

      function buildMapMeta(items) {
        return `
          <div class="map-meta">
            ${items.map((item) => `<span>${item}</span>`).join("")}
          </div>
        `;
      }

      function ensureDeliveryMap() {
        const container = document.getElementById("deliveryMap");
        if (!container || typeof L === "undefined") {
          return null;
        }

        if (!deliveryMap) {
          deliveryMap = L.map(container, {
            zoomControl: true,
            scrollWheelZoom: true,
          });
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "&copy; OpenStreetMap contributors",
          }).addTo(deliveryMap);
          deliveryLayers = {
            markers: L.layerGroup().addTo(deliveryMap),
            route: L.layerGroup().addTo(deliveryMap),
          };
          deliveryMap.on("click", (event) => {
            const point = { lat: event.latlng.lat, lng: event.latlng.lng };
            setSelectedDriverPoint(point);
            renderDeliveryMap();
            setStatus("Driver location updated from the map. Save it with Update Location.");
          });
        } else if (deliveryMap.getContainer() !== container) {
          container.replaceWith(deliveryMap.getContainer());
        }

        setTimeout(() => deliveryMap.invalidateSize(), 0);
        return deliveryMap;
      }

      function renderDeliveryMap() {
        const map = ensureDeliveryMap();
        if (!map || !deliveryLayers) {
          return;
        }

        deliveryLayers.markers.clearLayers();
        deliveryLayers.route.clearLayers();

        const order = currentAssignment ? currentAssignment.order || {} : {};
        const restaurant = currentAssignment ? currentAssignment.restaurant || {} : {};
        const dropoffAddress = parseAddress(order.delivery_address);
        const restaurantPoint = pointFromValues(restaurant.latitude, restaurant.longitude);
        const driverPoint =
          selectedDriverPoint ||
          pointFromValues(partner && partner.latitude, partner && partner.longitude);
        const dropoffPoint = pointFromValues(dropoffAddress.latitude, dropoffAddress.longitude);
        const points = [restaurantPoint, driverPoint, dropoffPoint].filter(Boolean);

        if (!points.length) {
          map.setView([37.7749, -122.4194], 12);
          return;
        }

        if (restaurantPoint) {
          L.marker([restaurantPoint.lat, restaurantPoint.lng], { title: "Restaurant pickup" })
            .bindPopup(`<div class="map-popup"><strong>${restaurant.name || "Restaurant"}</strong><br>${restaurant.address || "Pickup location"}</div>`)
            .addTo(deliveryLayers.markers);
        }

        if (dropoffPoint) {
          L.marker([dropoffPoint.lat, dropoffPoint.lng], { title: "Customer dropoff" })
            .bindPopup(`<div class="map-popup"><strong>Dropoff</strong><br>${formatAddress(order.delivery_address)}</div>`)
            .addTo(deliveryLayers.markers);
        }

        if (driverPoint) {
          L.marker([driverPoint.lat, driverPoint.lng], {
            title: "Driver location",
            draggable: true,
          })
            .on("dragend", (event) => {
              const latlng = event.target.getLatLng();
              setSelectedDriverPoint({ lat: latlng.lat, lng: latlng.lng });
              renderDeliveryMap();
              setStatus("Driver pin moved. Save it with Update Location.");
            })
            .bindPopup(`<div class="map-popup"><strong>Driver</strong><br>Drag this pin or click the map to choose a location.</div>`)
            .addTo(deliveryLayers.markers);
        }

        const routePoints = [restaurantPoint, driverPoint, dropoffPoint].filter(Boolean).map((point) => [point.lat, point.lng]);
        if (routePoints.length >= 2) {
          L.polyline(routePoints, {
            color: "#2563eb",
            weight: 4,
            opacity: 0.85,
            dashArray: currentAssignment ? null : "10 10",
          }).addTo(deliveryLayers.route);
        }

        if (points.length === 1) {
          map.setView([points[0].lat, points[0].lng], 14);
        } else {
          map.fitBounds(L.latLngBounds(points.map((point) => [point.lat, point.lng])), {
            padding: [30, 30],
          });
        }
      }

      function renderStats() {
        refs.statsGrid.innerHTML = [
          statCard("Partner ID", partner ? `#${partner.id}` : "-"),
          statCard("Available", partner && partner.is_available ? "Yes" : "No"),
          statCard("Deliveries", partner ? partner.total_deliveries : "0"),
          statCard("Rating", partner ? Number(partner.rating || 0).toFixed(1) : "-"),
        ].join("");
      }

      function renderQueue(orders) {
        const firstReadyIndex = orders.findIndex((order) => String(order.status).toLowerCase() === "ready_for_pickup");
        const recommendedOrder = firstReadyIndex >= 0 ? orders[firstReadyIndex] : null;
        refs.queueSummary.textContent = currentAssignment
          ? "Finish the current delivery before claiming another order."
          : recommendedOrder
          ? `Recommended next claim: order #${recommendedOrder.id}. Ready orders are sorted ahead of active prep.`
          : orders.length
          ? "Orders are active, but the restaurant has not marked one ready for pickup yet."
          : "No active orders right now.";
        if (!orders.length) {
          refs.queueTable.innerHTML = `<tr><td colspan="6" class="empty">No active orders right now.</td></tr>`;
          return;
        }

        refs.queueTable.innerHTML = orders.map((order, index) => {
          const orderStatus = String(order.status).toLowerCase();
          const isReady = orderStatus === "ready_for_pickup";
          const isRecommended = recommendedOrder && order.id === recommendedOrder.id;
          const claimDisabled = currentAssignment || !isReady || !isRecommended;
          return `
          <tr class="${isRecommended ? "recommended-row" : ""}">
            <td>
              <div class="queue-meta">
                <strong>#${order.id}</strong>
                <span class="muted">Placed ${order.placed_at ? new Date(order.placed_at).toLocaleTimeString() : "-"}</span>
                ${isRecommended ? `<span class="recommend-tag">Recommended</span>` : ""}
                ${!isReady ? `<span class="muted">Waiting for restaurant ready status</span>` : ""}
              </div>
            </td>
            <td><span class="tag ${String(order.priority_level).toLowerCase()}">${order.priority_level}</span></td>
            <td>${formatQueueEta(order)}</td>
            <td>${order.status}</td>
            <td>${Number(order.priority_score || 0).toFixed(1)}</td>
            <td>
              <button
                class="${isRecommended ? "success" : "secondary"}"
                ${claimDisabled ? "disabled" : ""}
                onclick="claimOrder(${order.id})"
              >
                ${isReady ? (isRecommended ? "Claim Highest" : "Wait") : "Not Ready"}
              </button>
            </td>
          </tr>
        `;
        }).join("");
      }

      function renderWorkflow() {
        const status = currentAssignment ? String(currentAssignment.status).toLowerCase() : "";
        const steps = [
          ["1", "Claim highest priority", !currentAssignment],
          ["2", "Update location", status === "assigned" || status === "picked_up"],
          ["3", "Mark picked up", status === "assigned"],
          ["4", "Mark delivered", status === "picked_up"],
        ];
        refs.workflow.innerHTML = steps.map(([index, label, active]) => `
          <div class="workflow-step ${active ? "active" : ""}">
            <span class="workflow-index">${index}</span>
            <span>${label}</span>
          </div>
        `).join("");
      }

      function renderCurrentDelivery() {
        if (!currentAssignment) {
          refs.currentDelivery.innerHTML = `
            <div class="map-shell">
              <div id="deliveryMap" class="map"></div>
              ${buildMapMeta([
                "Click the map to place the driver",
                "Drag the blue driver pin to adjust location",
                "Claim an order to see pickup and dropoff markers",
              ])}
            </div>
            <p class="empty">No active assignment. Claim a ready-for-pickup order from the priority queue.</p>
          `;
          renderDeliveryMap();
          refs.pickedUpBtn.disabled = true;
          refs.deliveredBtn.disabled = true;
          refs.locationBtn.disabled = true;
          refs.locationHint.textContent = "Claim an order first. Then record location, pickup, and delivery progress here.";
          return;
        }

        const order = currentAssignment.order || {};
        const restaurant = currentAssignment.restaurant || {};
        refs.currentDelivery.innerHTML = `
          <div class="map-shell">
            <div id="deliveryMap" class="map"></div>
            ${buildMapMeta([
              restaurant.name || "Restaurant pickup",
              `ETA ${currentAssignment.eta_minutes || 0} min`,
              formatAddress(order.delivery_address),
            ])}
          </div>
          <div class="table-wrap">
            <table>
              <tbody>
                <tr><th>Assignment</th><td>#${currentAssignment.id}</td></tr>
                <tr><th>Order</th><td>#${currentAssignment.order_id}</td></tr>
                <tr><th>Status</th><td>${currentAssignment.status}</td></tr>
                <tr><th>Priority</th><td>${order.priority_level || "-"}</td></tr>
                <tr><th>Instructions</th><td>${order.special_instructions || "-"}</td></tr>
                <tr><th>Pickup</th><td>${restaurant.address || "-"}</td></tr>
                <tr><th>Dropoff</th><td>${formatAddress(order.delivery_address)}</td></tr>
              </tbody>
            </table>
          </div>
        `;
        renderDeliveryMap();
        const assignmentStatus = String(currentAssignment.status).toLowerCase();
        refs.locationBtn.disabled = false;
        refs.pickedUpBtn.disabled = assignmentStatus !== "assigned";
        refs.deliveredBtn.disabled = assignmentStatus !== "picked_up";
        refs.locationHint.textContent =
          assignmentStatus === "assigned"
            ? "Recommended next step: update location, then mark the order picked up."
            : assignmentStatus === "picked_up"
            ? "Recommended next step: update location during travel, then mark delivered."
            : "This assignment no longer needs driver action.";
      }

      async function loginImpl() {
        setStatus("Signing in...");
        const payload = await api("/auth/login", {
          method: "POST",
          body: JSON.stringify({
            email: refs.email.value,
            password: refs.password.value,
          }),
        });
        authToken = payload.access_token;
        currentUser = payload.user;

        if (currentUser.role !== "delivery_partner" && currentUser.role !== "admin") {
          throw new Error("Please sign in with a delivery partner account.");
        }

        partner = await api(`/delivery/partners/by-user/${currentUser.id}`);
        setStatus(`Signed in as ${currentUser.full_name}. Loading deliveries...`);
        await loadWorkspaceImpl();
      }

      async function registerPartnerImpl() {
        if (!refs.registerFullName.value.trim() || !refs.registerEmail.value.trim() || !refs.registerPassword.value.trim()) {
          throw new Error("Enter driver name, email, and password.");
        }
        await api("/auth/register/delivery-partner", {
          method: "POST",
          body: JSON.stringify({
            full_name: refs.registerFullName.value.trim(),
            phone_number: refs.registerPhone.value.trim() || null,
            email: refs.registerEmail.value.trim(),
            password: refs.registerPassword.value,
            latitude: refs.registerLatitude.value ? Number(refs.registerLatitude.value) : null,
            longitude: refs.registerLongitude.value ? Number(refs.registerLongitude.value) : null,
          }),
        });
        ["registerFullName", "registerPhone", "registerEmail", "registerPassword", "registerLatitude", "registerLongitude"].forEach((key) => {
          refs[key].value = "";
        });
      }

      async function loadWorkspaceImpl() {
        if (!partner) {
          setStatus("Please sign in first.");
          return;
        }

        const [queueResult, currentResult] = await Promise.all([
          api("/orders/queue/pending"),
          api(`/delivery/partners/${partner.id}/current`),
        ]);
        const queueOrders = await hydrateQueueEtas(queueResult.orders || []);

        partner = currentResult.partner;
        selectedDriverPoint = pointFromValues(partner && partner.latitude, partner && partner.longitude);
        currentAssignment = currentResult.assignment;
        renderStats();
        renderQueue(queueOrders);
        renderCurrentDelivery();
        renderWorkflow();
        setStatus(`Workspace refreshed at ${new Date().toLocaleTimeString()}.`);
      }

      async function hydrateQueueEtas(orders) {
        return Promise.all(orders.map(async (order) => {
          try {
            const etaPayload = await api(`/delivery/${order.id}/eta`);
            return { ...order, eta_payload: etaPayload };
          } catch (_error) {
            return order;
          }
        }));
      }

      async function claimOrderImpl(orderId) {
        if (!partner) {
          throw new Error("Please sign in first.");
        }
        if (currentAssignment) {
          throw new Error("Finish the current delivery before claiming another order.");
        }
        await api(`/delivery/${orderId}/assign`, {
          method: "POST",
          body: JSON.stringify({ partnerId: partner.id }),
        });
        await loadWorkspaceImpl();
      }

      async function updateAssignmentStatusImpl(status) {
        if (!currentAssignment) {
          throw new Error("No active assignment.");
        }
        await api(`/delivery/assignment/${currentAssignment.id}/status`, {
          method: "PATCH",
          body: JSON.stringify({ status }),
        });
        await loadWorkspaceImpl();
      }

      async function updateLocationImpl() {
        if (!partner || !currentAssignment) {
          throw new Error("Claim an active delivery before updating location.");
        }
        if (!selectedDriverPoint) {
          throw new Error("Choose the driver location from the map or browser GPS before updating.");
        }
        await api("/delivery/location", {
          method: "POST",
          body: JSON.stringify({
            delivery_partner_id: partner.id,
            assignment_id: currentAssignment.id,
            latitude: selectedDriverPoint.lat,
            longitude: selectedDriverPoint.lng,
          }),
        });
        await loadWorkspaceImpl();
      }

      function useBrowserLocationImpl() {
        if (!navigator.geolocation) {
          setStatus("Browser location is not available.");
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (position) => {
            setSelectedDriverPoint({
              lat: position.coords.latitude,
              lng: position.coords.longitude,
            });
            renderDeliveryMap();
            setStatus("Location fields updated from browser GPS.");
          },
          (error) => setStatus(error.message)
        );
      }

      refs.loginBtn.addEventListener("click", () => loginImpl().catch((error) => setStatus(error.message)));
      refs.registerBtn.addEventListener("click", () =>
        registerPartnerImpl()
          .then(() => setStatus("Application submitted. An admin must approve this delivery agent account before sign-in."))
          .catch((error) => setStatus(error.message))
      );
      refs.refreshBtn.addEventListener("click", () => loadWorkspaceImpl().catch((error) => setStatus(error.message)));
      refs.useBrowserLocationBtn.addEventListener("click", () => useBrowserLocationImpl());
      refs.locationBtn.addEventListener("click", () => updateLocationImpl().catch((error) => setStatus(error.message)));
      refs.pickedUpBtn.addEventListener("click", () => updateAssignmentStatusImpl("picked_up").catch((error) => setStatus(error.message)));
      refs.deliveredBtn.addEventListener("click", () => updateAssignmentStatusImpl("delivered").catch((error) => setStatus(error.message)));

      window.claimOrder = (orderId) => claimOrderImpl(orderId).catch((error) => setStatus(error.message));
    </script>
  </body>
</html>
