<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POP Admin Dashboard</title>
    <style>
      :root {
        --bg: #f4efe7;
        --panel: #fffdf8;
        --ink: #1f2933;
        --muted: #66788a;
        --accent: #c75b39;
        --accent-dark: #8f3f24;
        --ok: #2e8b57;
        --warn: #d97706;
        --danger: #c53030;
        --border: #eadfce;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(199, 91, 57, 0.16), transparent 28%),
          linear-gradient(180deg, #f8f2ea 0%, var(--bg) 100%);
        color: var(--ink);
      }
      .shell {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px;
      }
      .hero {
        display: grid;
        gap: 16px;
        grid-template-columns: 1.2fr 0.8fr;
        margin-bottom: 24px;
      }
      .panel {
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(31, 41, 51, 0.06);
      }
      h1, h2, h3, p { margin: 0; }
      .hero h1 { font-size: 2rem; }
      .muted { color: var(--muted); }
      .auth-grid, .stats-grid {
        display: grid;
        gap: 16px;
      }
      .auth-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-top: 16px;
      }
      input, button {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        font: inherit;
      }
      button {
        border: none;
        background: var(--accent);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary { background: #e8ddd0; color: var(--ink); }
      button:hover { background: var(--accent-dark); }
      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-top: 16px;
      }
      .stat {
        padding: 16px;
        border-radius: 16px;
        background: linear-gradient(180deg, #fff 0%, #f9f5ef 100%);
        border: 1px solid var(--border);
      }
      .stat .value {
        font-size: 1.7rem;
        font-weight: 800;
        margin-top: 8px;
      }
      .table-wrap {
        overflow: auto;
        margin-top: 16px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 12px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        font-size: 0.95rem;
      }
      th { color: var(--muted); font-weight: 700; }
      .tag {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 700;
      }
      .critical { background: #fde2e2; color: var(--danger); }
      .high { background: #fdebd3; color: var(--warn); }
      .normal { background: #e4f3e8; color: var(--ok); }
      .low { background: #edf2f7; color: var(--muted); }
      .split {
        display: grid;
        gap: 20px;
        grid-template-columns: 1.1fr 0.9fr;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
      }
      .status {
        margin-top: 12px;
        min-height: 20px;
        color: var(--muted);
      }
      @media (max-width: 900px) {
        .hero, .split { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="hero">
        <section class="panel">
          <h1>POP Admin Control Room</h1>
          <p class="muted" style="margin-top: 8px;">
            Monitor order flow, priority queue health, restaurant approvals, and revenue in one place.
          </p>
          <div class="auth-grid">
            <input id="gatewayUrl" />
            <input id="email" placeholder="Admin email" />
            <input id="password" type="password" placeholder="Password" />
            <button id="loginBtn">Sign In</button>
          </div>
          <div class="actions">
            <button class="secondary" id="refreshBtn">Refresh Dashboard</button>
            <button id="dispatchBtn">Dispatch Next Priority Order</button>
          </div>
          <div class="status" id="statusText">Sign in with an admin account to load live data.</div>
        </section>
        <section class="panel">
          <h2>System Snapshot</h2>
          <div class="stats-grid" id="statsGrid"></div>
        </section>
      </div>
      <div class="split">
        <section class="panel">
          <h2>Priority Order Flow</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Order</th>
                  <th>Status</th>
                  <th>Priority</th>
                  <th>Score</th>
                  <th>Queue Rank</th>
                  <th>Placed</th>
                </tr>
              </thead>
              <tbody id="ordersTable"></tbody>
            </table>
          </div>
        </section>
        <section class="panel">
          <h2>Restaurant Approvals</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="restaurantsTable"></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
    <script>
      let authToken = "";
      const defaultGatewayUrl =
        window.location.port === "8000"
          ? `${window.location.origin}/api/v1`
          : `${window.location.protocol}//${window.location.hostname}:8000/api/v1`;
      const refs = {
        gatewayUrl: document.getElementById("gatewayUrl"),
        email: document.getElementById("email"),
        password: document.getElementById("password"),
        loginBtn: document.getElementById("loginBtn"),
        refreshBtn: document.getElementById("refreshBtn"),
        dispatchBtn: document.getElementById("dispatchBtn"),
        statusText: document.getElementById("statusText"),
        statsGrid: document.getElementById("statsGrid"),
        ordersTable: document.getElementById("ordersTable"),
        restaurantsTable: document.getElementById("restaurantsTable"),
      };

      refs.gatewayUrl.value = defaultGatewayUrl;

      function setStatus(message) {
        refs.statusText.textContent = message;
      }

      async function api(path, options = {}) {
        const response = await fetch(`${refs.gatewayUrl.value}${path}`, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...(authToken ? { Authorization: `Bearer ${authToken}` } : {}),
            ...(options.headers || {}),
          },
        });
        if (!response.ok) {
          const body = await response.text();
          throw new Error(body || `Request failed: ${response.status}`);
        }
        return response.json();
      }

      async function loginImpl() {
        setStatus("Signing in...");
        const payload = await api("/auth/login", {
          method: "POST",
          body: JSON.stringify({
            email: refs.email.value,
            password: refs.password.value,
          }),
        });
        authToken = payload.access_token;
        setStatus(`Signed in as ${payload.user.full_name}. Loading dashboard...`);
        await loadDashboardImpl();
      }

      function statCard(label, value) {
        return `<div class="stat"><div class="muted">${label}</div><div class="value">${value}</div></div>`;
      }

      function renderStats(stats, serviceHealth) {
        refs.statsGrid.innerHTML = [
          statCard("Total Orders", stats.orders.total),
          statCard("Pending Orders", stats.orders.pending),
          statCard("Priority Orders", stats.orders.priority),
          statCard("Delivered Orders", stats.orders.delivered),
          statCard("Revenue", `$${stats.revenue.total.toFixed(2)}`),
          statCard(
            "Healthy Services",
            `${Object.values(serviceHealth.services).filter((entry) => entry.ok).length}/${Object.keys(serviceHealth.services).length}`
          ),
        ].join("");
      }

      function renderOrders(orders) {
        refs.ordersTable.innerHTML = orders.map((order) => `
          <tr>
            <td>#${order.id}</td>
            <td>${order.status}</td>
            <td><span class="tag ${String(order.priority_level).toLowerCase()}">${order.priority_level}</span></td>
            <td>${Number(order.priority_score || 0).toFixed(1)}</td>
            <td>${order.queue_rank || "-"}</td>
            <td>${order.placed_at ? new Date(order.placed_at).toLocaleString() : "-"}</td>
          </tr>
        `).join("");
      }

      function renderRestaurants(restaurants) {
        refs.restaurantsTable.innerHTML = restaurants.map((restaurant) => `
          <tr>
            <td>${restaurant.id}</td>
            <td>${restaurant.name}</td>
            <td>${restaurant.approval_status || "approved"}</td>
            <td>
              <button onclick="approveRestaurant(${restaurant.id}, 'approved')" style="margin-bottom: 8px;">Approve</button>
              <button class="secondary" onclick="approveRestaurant(${restaurant.id}, 'pending')">Hold</button>
            </td>
          </tr>
        `).join("");
      }

      async function loadDashboardImpl() {
        if (!authToken) {
          setStatus("Please sign in first.");
          return;
        }
        setStatus("Refreshing dashboard...");
        const [statsResult, serviceHealthResult, ordersResult, restaurantsResult] = await Promise.allSettled([
          api("/admin/stats/overview"),
          api("/admin/health/services"),
          api("/admin/orders"),
          api("/restaurants/?approved_only=false&public_only=false"),
        ]);

        if (statsResult.status !== "fulfilled" || serviceHealthResult.status !== "fulfilled" || ordersResult.status !== "fulfilled") {
          const firstError =
            statsResult.status === "rejected" ? statsResult.reason :
            serviceHealthResult.status === "rejected" ? serviceHealthResult.reason :
            ordersResult.reason;
          throw firstError;
        }

        renderStats(statsResult.value, serviceHealthResult.value);
        renderOrders(ordersResult.value.orders);

        if (restaurantsResult.status === "fulfilled") {
          renderRestaurants(restaurantsResult.value.restaurants);
          setStatus(`Dashboard refreshed at ${new Date().toLocaleTimeString()}.`);
        } else {
          refs.restaurantsTable.innerHTML = `
            <tr>
              <td colspan="4">Restaurant list unavailable right now.</td>
            </tr>
          `;
          setStatus(`Dashboard refreshed at ${new Date().toLocaleTimeString()} (without restaurant approvals).`);
        }
      }

      async function dispatchNextImpl() {
        await api("/admin/dispatch/next", { method: "POST" });
        await loadDashboardImpl();
      }

      async function approveRestaurantImpl(id, approvalStatus) {
        await api(`/admin/restaurants/${id}/approval`, {
          method: "PATCH",
          body: JSON.stringify({ approval_status: approvalStatus }),
        });
        await loadDashboardImpl();
      }

      refs.loginBtn.addEventListener("click", () => loginImpl().catch((error) => setStatus(error.message)));
      refs.refreshBtn.addEventListener("click", () => loadDashboardImpl().catch((error) => setStatus(error.message)));
      refs.dispatchBtn.addEventListener("click", () => dispatchNextImpl().catch((error) => setStatus(error.message)));
      window.approveRestaurant = (id, status) => approveRestaurantImpl(id, status).catch((error) => setStatus(error.message));
    </script>
  </body>
</html>
